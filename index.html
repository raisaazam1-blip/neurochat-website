<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroChat - Next-Gen Neural Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f0d2e 100%);
            z-index: -2;
            animation: gradientShift 8s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(10deg); }
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(100, 200, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100, 200, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            animation: slideGrid 20s linear infinite;
        }

        @keyframes slideGrid {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            backdrop-filter: blur(10px);
            background: rgba(10, 14, 39, 0.7);
            border-bottom: 1px solid rgba(100, 200, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #64c8ff, #7dd3fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo span {
            color: #fbbf24;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        /* Buttons */
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #64c8ff, #7dd3fc);
            color: #0a0e27;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(100, 200, 255, 0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #64c8ff;
            color: #64c8ff;
        }

        .btn-secondary:hover {
            background: rgba(100, 200, 255, 0.1);
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
        }

        /* Hero Section */
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8rem 3rem;
            gap: 4rem;
            min-height: 100vh;
        }

        .hero-text {
            flex: 1;
            animation: fadeInLeft 1s ease;
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            background: linear-gradient(135deg, #64c8ff, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 span {
            color: #7dd3fc;
        }

        .hero-text p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #b0b0b0;
            line-height: 1.6;
        }

        .hero-btns {
            display: flex;
            gap: 1rem;
        }

        /* Chat Card */
        .chat-card {
            flex: 1;
            background: rgba(15, 13, 46, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-width: 400px;
            height: 550px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: fadeInRight 1s ease;
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem;
            background: rgba(100, 200, 255, 0.05);
            border-bottom: 1px solid rgba(100, 200, 255, 0.2);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-title {
            font-weight: 600;
            letter-spacing: 1px;
            color: #64c8ff;
        }

        .chat-body {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            max-width: 85%;
            word-wrap: break-word;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            background: rgba(100, 200, 255, 0.15);
            border-left: 3px solid #64c8ff;
            align-self: flex-start;
            color: #e0e0e0;
        }

        .message.user {
            background: linear-gradient(135deg, rgba(100, 200, 255, 0.3), rgba(125, 211, 252, 0.2));
            border-right: 3px solid #7dd3fc;
            align-self: flex-end;
            color: #ffffff;
        }

        .chat-footer {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            background: rgba(100, 200, 255, 0.05);
            border-top: 1px solid rgba(100, 200, 255, 0.2);
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(100, 200, 255, 0.2);
            color: #e0e0e0;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: #64c8ff;
            box-shadow: 0 0 15px rgba(100, 200, 255, 0.2);
        }

        .send-btn {
            background: linear-gradient(135deg, #64c8ff, #7dd3fc);
            border: none;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(100, 200, 255, 0.4);
        }

        .typing-indicator {
            display: none;
            gap: 0.4rem;
            padding: 1rem;
            justify-content: center;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #64c8ff;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .hero { flex-direction: column; padding: 4rem 1.5rem; gap: 2rem; }
            .chat-card { max-width: 100%; height: 450px; }
            nav { padding: 1rem 1.5rem; }
            .nav-links { gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-animate"></div>
    <div class="grid-bg"></div>

    <nav>
        <div class="logo"><span>NEURO</span>CHAT</div>
        <div class="nav-links">
            <a href="#chat" class="btn btn-primary" style="padding: 8px 20px; font-size: 0.8rem;">Launch App</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h1>Next-Gen <span>Neural</span> Intelligence</h1>
            <p>Experience a conversational AI interface designed for speed, precision, and aesthetic clarity. Built on the edge of the future.</p>
            <div class="hero-btns">
                <a href="#chat" class="btn btn-primary">Try Demo</a>
                <a href="#" class="btn btn-secondary">Documentation</a>
            </div>
        </div>

        <div class="chat-card" id="chat">
            <div class="chat-header">
                <div class="status-dot"></div>
                <div class="chat-title">NEURO-CORE v1.0</div>
            </div>
            <div class="chat-body" id="chatBody">
                <div class="message bot" style="opacity: 1;">Hello! I am NeuroChat. How can I assist your workflow today?</div>
            </div>
            <div class="typing-indicator" id="typing">
                <span></span><span></span><span></span>
            </div>
            <div class="chat-footer">
                <input type="text" class="chat-input" id="userInput" placeholder="Type a command...">
                <button class="send-btn" onclick="sendMessage()">🚀</button>
            </div>
        </div>
    </section>

    <script>
        const chatBody = document.getElementById('chatBody');
        const userInput = document.getElementById('userInput');
        const typing = document.getElementById('typing');

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add User Message
            addMessage(text, 'user');
            userInput.value = '';

            // Simulate Bot Response
            typing.style.display = 'flex';
            chatBody.scrollTop = chatBody.scrollHeight;

            setTimeout(() => {
                typing.style.display = 'none';
                addMessage("System processing... This is a simulated response from the Neuro-Core.", 'bot');
            }, 1500);
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            div.style.opacity = '1';
            chatBody.appendChild(div);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        // Allow 'Enter' key to send
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
